<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Catcompanion - Website Update</title>
  <style>
    body, html {
      height: 100%;
      margin: 0;
      overflow-x: hidden;
    }

    .bgimg {
      background-image: url('/assets/images/soon.png');
      height: 100%;
      background-position: center;
      background-size: cover;
      position: relative;
      color: white;
      font-family: "Courier New", Courier, monospace;
      font-size: 25px;
    }

    .topleft {
      position: absolute;
      top: 0;
      left: 16px;
    }

    .bottomcenter {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translate(-50%, 5%);
      text-align: center;
    }

    .middle {
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    hr {
      margin: auto;
      width: 40%;
    }
  </style>
</head>
<body>

<div class="bgimg">
  <div class="topleft">
    <!-- optional: content here -->
  </div>
  <div class="middle">

    <hr>
    <p>Cat Companion is closed.</p>
    <p>There are no immediate plans to resume in the near future.</p>
    <p>Contact: dept45@catcompanion.co.uk</p>
  </div>
  <div class="bottomcenter">
    <!-- optional: content here -->
  </div>
</div>

</body>
</html>
